<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تسجيل الدخول - الاستراتيجية الصناعية 2040</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg: #f0f4f8; --brand: #176b87; --brand2: #0b4f6c; --muted: #64748b; --line: #e2e8f0; --shadow: 0 10px 30px rgba(15, 23, 42, .05); }
    body { margin: 0; font-family: Tahoma, Arial, sans-serif; background: var(--bg); color: #0f172a; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-box { background: #fff; border-radius: 20px; padding: 40px; box-shadow: var(--shadow); width: 100%; max-width: 420px; text-align: center; border: 1px solid var(--line); }
    .login-box h2 { margin-top: 0; color: var(--brand2); margin-bottom: 10px; font-size: 24px; }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
    .login-box input { margin-bottom: 16px; padding: 12px; font-size: 14px; width: 100%; border: 1px solid var(--line); border-radius: 10px; outline: none; box-sizing: border-box; }
    .login-box input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(23,107,135,.1); }
    .login-box button { width: 100%; padding: 12px; background: var(--brand); color: #fff; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .login-box button:hover { background: var(--brand2); }
    .hidden { display: none !important; }
    .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--brand2); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 14.5px; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000;}
    .toast.show { opacity: 1; top: 40px; }
    .toast.error { background: #ef4444; } .toast.success { background: #16a34a; }
  </style>
</head>
<body>

  <div id="toastPopup" class="toast"></div>

  <div class="login-box">
    <h2>الاستراتيجية الصناعية 2040</h2>
    <p>بوابة الدخول للمصرح لهم فقط</p>
    
    <div id="step1">
      <input type="text" id="loginIdentifier" placeholder="اسم المستخدم أو البريد الإلكتروني" onkeypress="if(event.key === 'Enter') sendCode()" />
      <button onclick="sendCode()" id="btnSendCode">إرسال رمز التحقق</button>
    </div>
    
    <div id="step2" class="hidden">
      <p style="font-size:13px;color:#16a34a;margin-bottom:10px;font-weight:bold;" id="otpMsg">✅ تم إرسال الرمز إلى بريدك الإلكتروني.</p>
      <input type="text" id="loginOtp" placeholder="أدخل الرمز المكون من 6 أرقام" onkeypress="if(event.key === 'Enter') verifyCode()" />
      <button onclick="verifyCode()" id="btnVerifyCode">تحقق ودخول</button>
      <button onclick="resetLogin()" style="background:transparent; color:var(--muted); margin-top:10px; box-shadow:none;">رجوع / تعديل الإيميل</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ictyhtprnmfewjrlrctg.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_3lCPQVLuTY2ZI5OyDuc1Aw_ZnF1RgAI';
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentAuthEmail = "";
    
    // الدومين الافتراضي لشركتك (لتفعيل تسجيل الدخول باسم المستخدم فقط)
    const DEFAULT_DOMAIN = '@oman2040.om'; 

    let toastTimeout;
    function showToast(msg, type = "") {
      const t = document.getElementById("toastPopup"); t.className = "toast show " + type; t.innerHTML = msg;
      clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.classList.remove("show"), 3500);
    }

    // التحقق إذا كان المستخدم مسجلاً مسبقاً، يحوله للداشبورد مباشرة
    window.onload = async function() {
      const { data: { session } } = await window.supabaseClient.auth.getSession();
      if (session) window.location.href = 'index.html';
    };

    async function sendCode() {
      const identifier = document.getElementById('loginIdentifier').value.trim().toLowerCase();
      if(!identifier) { showToast("يرجى إدخال اسم المستخدم أو الإيميل.", "error"); return; }
      
      const btn = document.getElementById('btnSendCode');
      btn.disabled = true; btn.textContent = "جاري الإرسال...";
      
      // التمييز الذكي بين اسم المستخدم والإيميل
      currentAuthEmail = identifier.includes('@') ? identifier : identifier + DEFAULT_DOMAIN;

      const { data, error } = await window.supabaseClient.auth.signInWithOtp({
        email: currentAuthEmail,
        options: { shouldCreateUser: false } // منع تسجيل غرباء جدد
      });

      btn.disabled = false; btn.textContent = "إرسال رمز التحقق";

      if (error) { showToast("البيانات غير مسجلة أو خطأ: " + error.message, "error"); } 
      else {
        document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden');
        showToast("تم إرسال الرمز بنجاح", "success");
      }
    }

    async function verifyCode() {
      const code = document.getElementById('loginOtp').value.trim();
      if(!code) { showToast("يرجى إدخال الرمز.", "error"); return; }
      
      const btn = document.getElementById('btnVerifyCode'); 
      btn.disabled = true; btn.textContent = "جاري التحقق...";

      const { data, error } = await window.supabaseClient.auth.verifyOtp({ email: currentAuthEmail, token: code, type: 'email' });

      btn.disabled = false; btn.textContent = "تحقق ودخول";

      if (error) { showToast("الرمز خاطئ.", "error"); } 
      else {
        // تحديث وقت النشاط وتحويله للنظام
        localStorage.setItem('last_activity_time', Date.now());
        window.location.href = 'index.html'; 
      }
    }
    
    function resetLogin() { document.getElementById('step2').classList.add('hidden'); document.getElementById('step1').classList.remove('hidden'); document.getElementById('loginOtp').value = ""; }
  </script>
</body>
</html>
