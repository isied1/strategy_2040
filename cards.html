<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الاستراتيجية الصناعية 2040 - استعراض المبادرات</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root{ --bg:#f8fafc; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; --brand:#176b87; --brand2:#0b4f6c; --soft:#f0f7f9; --shadow:0 10px 30px rgba(15, 23, 42, .04); --radius:16px; }
    *{box-sizing:border-box}
    body{margin:0; font-family: Tahoma, Arial, sans-serif; background: var(--bg); color:var(--ink); line-height:1.7;}
    .shell{max-width:1440px;margin:auto;padding:16px}
    
    .header-bar { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 18px 32px; box-shadow: var(--shadow); border-bottom: 3px solid var(--brand); width: 100%; margin-bottom:0; }
    .header-bar h1 { margin: 0; color: var(--brand2); font-size: 22px; font-weight: 800; }
    .header-user { display: flex; align-items: center; gap: 16px; font-weight: bold; }
    
    .btn-primary { background: var(--brand); color: #fff; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-weight: bold; font-family: inherit; transition: 0.2s; }
    .btn-primary:hover { background: var(--brand2); }
    .btn-logout { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 6px 16px; cursor: pointer; font-family: inherit; font-weight: bold; transition: 0.2s; }
    .btn-logout:hover { background: #dc2626; }
    .btn-review{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:bold; transition: 0.2s;}
    .btn-review:hover{background:var(--brand2);}

    .toast-popup { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--brand2); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: bold; font-size: 14.5px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 10005; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
    .toast-popup.show { opacity: 1; top: 40px; }
    .toast-popup.success { background: #16a34a; }
    .toast-popup.error { background: #ef4444; }

    .panel{ background: #ffffff; border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .filters{display:grid;grid-template-columns: 1.2fr 1fr 1fr 1fr auto;gap:12px;align-items:start}
    input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 12px;font-family:inherit;color:var(--ink);outline:none;}
    input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(23,107,135,.1)}
    
    .search-select{position:relative;width:100%}
    .search-select-input{padding-left:42px; padding-right:12px; appearance:none;}
    .search-select:after{content:"⌄";position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-weight:bold;font-size:18px;}
    .entity-options{position:absolute;z-index:50;inset:auto 0 auto 0;top:calc(100% + 4px);max-height:250px;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 12px 28px rgba(15,23,42,.1);padding:4px}
    .entity-option{padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px}
    .entity-option:hover,.entity-option.active{background:var(--soft);color:var(--brand2);font-weight:bold}

    .dropdown { position: relative; display: inline-block; height: 100%; }
    .btn-menu { display: inline-flex; align-items: center; justify-content: center; height: 100%; padding: 0 16px; background: var(--brand2); color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.2s; }
    .dropdown-content { display: none; position: absolute; left: 0; top: calc(100% + 8px); background-color: #fff; min-width: 240px; box-shadow: var(--shadow); border: 1px solid var(--line); border-radius: 12px; z-index: 1000; overflow: hidden; }
    .dropdown-content.show { display: block; }
    .dropdown-content button { width: 100%; text-align: right; padding: 14px 16px; border: none; background: transparent; font-family: inherit; font-size: 13.5px; cursor: pointer; color: var(--ink); border-bottom: 1px solid var(--line); }
    .dropdown-content button:hover { background-color: var(--soft); color: var(--brand2); font-weight: bold; }
    
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px;border-top:1px solid var(--line);padding-top:14px}
    .stats .stat{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
    .stats .stat b{display:block;font-size:22px;color:var(--brand2);}
    .stats .stat span{font-size:12px;color:var(--muted)}
    
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;position:relative}
    
    .card-head{padding:16px;background:linear-gradient(180deg,#fff,var(--soft));border-bottom:1px solid var(--line)}
    .topline{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .badge{background:var(--brand2);color:#fff;border-radius:20px;padding:4px 12px;font-weight:bold;font-size:12px;direction:ltr;display:inline-block;}
    .card h2{margin:0;font-size:17px;line-height:1.5;color:#0f172a}
    
    .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
    .mini{background:#fff;border:1px solid var(--line);border-radius:10px;padding:6px 8px;min-height:54px}
    .mini span{display:block;color:var(--muted);font-size:11px;line-height:1.2;margin-bottom:2px}
    .mini b{font-size:12px;word-break:break-word}
    .progress{height:6px;background:#e2e8f0;border-radius:10px;margin-top:4px;overflow:hidden;}
    .bar{height:100%;background:var(--brand);border-radius:10px;}
    
    .card-body{padding:16px;flex-grow:1; display:flex; flex-direction:column; gap:14px;}
    .section-title{font-weight:bold;color:var(--brand2);margin-bottom:6px;font-size:13.5px;display:flex;gap:6px;align-items:center}
    .section-title:before{content:"";width:6px;height:6px;border-radius:50%;background:var(--brand)}
    
    .grid-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .list{margin:0;padding:0 16px 0 0}.list li{margin:3px 0;color:#334155;font-size:12.5px}
    
    .card-control { width: 100%; border: 1px solid transparent; background: transparent; font-family: inherit; color: inherit; font-size: inherit; font-weight: inherit; outline: none; padding: 4px 6px; margin: 0; resize: none; overflow: hidden; line-height: 1.6; }
    .empty{color:var(--muted);background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px;padding:10px;text-align:center;font-size:12px}
    .hidden{display:none!important}

    /* الشات بوت العائم */
    .chat-fab { position: fixed; bottom: 30px; left: 30px; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, var(--brand), var(--brand2)); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 28px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 9999; border: none; }
    .chat-window { position: fixed; bottom: 100px; left: 30px; width: 360px; max-width: 90vw; height: 500px; background: #fff; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); display: flex; flex-direction: column; z-index: 9999; transform: translateY(20px); opacity: 0; pointer-events: none; transition: all 0.3s ease; border: 1px solid var(--line); overflow: hidden; }
    .chat-window.show { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .chat-header { background: var(--brand2); color: #fff; padding: 16px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
    .chat-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; background: var(--bg); }
    .chat-msg { max-width: 85%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; word-wrap: break-word; }
    .chat-msg.user { align-self: flex-start; background: var(--brand); color: #fff; border-bottom-right-radius: 2px; }
    .chat-msg.ai { align-self: flex-end; background: #fff; border: 1px solid var(--line); color: var(--ink); border-bottom-left-radius: 2px; }
    .chat-input-area { display: flex; padding: 12px; background: #fff; border-top: 1px solid var(--line); gap: 8px; }
    .chat-input-area input { flex: 1; border: 1px solid var(--line); border-radius: 20px; padding: 10px 16px; outline: none; font-family: inherit; }
    .chat-input-area button { background: var(--brand); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="toastPopup" class="toast-popup"></div>

  <header id="appHeader" class="header-bar hidden">
    <h1>الاستراتيجية الصناعية 2040 - استعراض المبادرات</h1>
    <div class="header-user">
      <div class="dropdown" style="position: relative; display: inline-block;">
        <span id="displayUserName" onclick="toggleUserDropdown()" style="padding: 4px 8px; border-radius: 8px;"></span>
        <div id="userDropdownMenu" class="dropdown-content" style="right: 0; left: auto; min-width: 180px;">
          <button id="btnAdminUsers" class="hidden" onclick="goToAdminPage()" style="font-weight: bold; color: var(--brand2);">إدارة المستخدمين ⚙️</button>
        </div>
      </div>
      <span id="displayUserRole" style="font-size:11px; background:#e2e8f0; padding:2px 8px; border-radius:10px; color:#475569;"></span>
      <button class="btn-logout" onclick="logoutUser()">تسجيل الخروج</button>
    </div>
  </header>

  <main class="shell hidden" id="appContent" style="padding-top:24px;">
    <section class="panel">
      <div class="filters">
        <input id="searchInput" placeholder="بحث سريع..." />
        <div class="search-select" id="entitySelectBox">
          <input id="entitySearchBox" class="search-select-input" placeholder="كل الجهات المنفذة" autocomplete="off" />
          <div id="entityOptions" class="entity-options hidden"></div>
        </div>
        <div class="search-select">
          <select id="programSelect" class="search-select-input">
            <option value="">برنامج الاستراتيجية الصناعية 2040 (الكل)</option>
            <option value="ابتكار صناعات جديدة وذات تكنولوجيا متقدمة">ابتكار صناعات جديدة وذات تكنولوجيا متقدمة</option>
            <option value="ريادة الاعمال والابتكار">ريادة الاعمال والابتكار</option>
            <option value="التطوير والتحديث">التطوير والتحديث</option>
            <option value="الحوكمة وإدارة التنمية الصناعية">الحوكمة وإدارة التنمية الصناعية</option>
          </select>
        </div>
        <div class="search-select">
          <select id="followUpSelect" class="search-select-input">
            <option value="">كل المسؤولين عن المتابعة</option>
          </select>
        </div>
        
        <div style="display: flex; gap: 8px; height: 100%;">
          <button onclick="window.location.href='index.html'" class="btn-menu" title="الرئيسية (الداشبورد)">🏠</button>
          <button onclick="loadAllDataFromServer()" class="btn-menu" title="تحديث البيانات">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
          </button>
          <div class="dropdown">
            <button id="menuBtn" class="btn-menu" onclick="toggleMenu()">⋮</button>
            <div id="dropdownMenu" class="dropdown-content">
              <button onclick="exportToExcel(); toggleMenu();">تحميل البيانات (Excel) 📊</button>
              <button onclick="exportToPowerPoint(); toggleMenu();">تحميل البيانات (PowerPoint) 📽️</button>
            </div>
          </div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><b id="statInitiatives">0</b><span>المبادرات المعروضة</span></div>
        <div class="stat"><b id="statEntities">0</b><span>عدد الجهات المنفذة</span></div>
        <div class="stat"><b id="statAvg">0%</b><span>متوسط نسبة الإنجاز</span></div>
      </div>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <button class="chat-fab" onclick="toggleChat()" title="تحدث مع المستشار الذكي">🤖</button>
  <div class="chat-window" id="chatWindow">
    <div class="chat-header">
      <div style="display:flex; align-items:center; gap:8px;"><span>🤖</span> مساعد الاستراتيجية</div>
      <button style="background:transparent; border:none; color:#fff; cursor:pointer; font-size:16px;" onclick="toggleChat()">✖</button>
    </div>
    <div class="chat-body" id="chatBody">
      <div class="chat-msg ai">أهلاً بك! 👋 أنا المساعد الذكي للاستراتيجية. يمكنك سؤالي عن المبادرات المعروضة هنا.</div>
    </div>
    <div class="chat-input-area">
      <input type="text" id="chatInput" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key === 'Enter') sendChatMessage()" />
      <button id="chatSendBtn" onclick="sendChatMessage()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transform: rotate(180deg);"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
      </button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ictyhtprnmfewjrlrctg.supabase.co'; 
    const SUPABASE_ANON_KEY = 'sb_publishable_3lCPQVLuTY2ZI5OyDuc1Aw_ZnF1RgAI';
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let entitiesList = []; let initiatives = []; let selectedEntity = ''; let currentUser = null; let chatHistoryLog = [];

    const els = {
      cards: document.getElementById('cards'), searchInput: document.getElementById('searchInput'),
      entitySearchBox: document.getElementById('entitySearchBox'), entityOptions: document.getElementById('entityOptions'),
      programSelect: document.getElementById('programSelect'), followUpSelect: document.getElementById('followUpSelect'),
      statInitiatives: document.getElementById('statInitiatives'), statEntities: document.getElementById('statEntities'), statAvg: document.getElementById('statAvg')
    };

    function escapeHtml(v){ return String(v ?? '').replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s])); }
    function normalizeForCompare(v){ return String(v ?? '').replace(/\s+/g,' ').trim().replace(/[إأآٱ]/g,'ا').replace(/ى/g,'ي').replace(/ة/g,'ه').replace(/[ًٌٍَُِّْـ]/g,'').toLowerCase(); }
    function pctNumber(v){ const str = String(v || '0').trim(); let n = parseFloat(str.replace(/[^0-9.\-]/g, '')); if (!Number.isFinite(n)) return 0; if (n > 0 && n <= 1 && !str.includes('%')) { n = n * 100; } return n; }
    
    let toastTimeout;
    function showToast(message, type = "") {
      const toast = document.getElementById("toastPopup");
      toast.className = "toast-popup show " + type; toast.innerHTML = message;
      clearTimeout(toastTimeout);
      if(type === "success" || type === "error") { toastTimeout = setTimeout(() => { toast.classList.remove("show"); }, 3500); }
    }

    async function fetchUserProfile(email) {
      const { data, error } = await window.supabaseClient.from('profiles').select('email, role, name, allowed_initiatives').eq('email', email).single();
      if (error || !data) return null;
      return { email: data.email, name: data.name || email.split('@')[0], role: String(data.role || 'viewer').toLowerCase().trim(), allowed_initiatives: data.allowed_initiatives || '' };
    }

    window.onload = async function() {
      try {
        const { data: { session }, error } = await window.supabaseClient.auth.getSession();
        if (session && session.user) {
          currentUser = await fetchUserProfile(session.user.email);
          initAppAfterLogin();
        } else { window.location.href = 'login.html'; } 
      } catch(e) { window.location.href = 'login.html'; }
    };

    async function logoutUser() { await window.supabaseClient.auth.signOut(); window.location.href = 'login.html'; }
    function toggleUserDropdown() { if (currentUser && currentUser.role === 'admin') document.getElementById("userDropdownMenu").classList.toggle("show"); }
    function goToAdminPage() { window.location.href = "admin.html"; }

    function initAppAfterLogin() {
      document.getElementById('appHeader').classList.remove('hidden'); 
      document.getElementById('appContent').classList.remove('hidden');
      document.getElementById('displayUserName').textContent = currentUser.name;
      if (currentUser.role === 'admin') {
        document.getElementById('displayUserRole').textContent = 'مدير النظام'; 
        document.getElementById('displayUserName').style.cursor = 'pointer';
        document.getElementById('displayUserName').style.textDecoration = 'underline';
        document.getElementById('btnAdminUsers').classList.remove('hidden'); 
      } else { 
        document.getElementById('displayUserRole').textContent = currentUser.role === 'editor' ? 'صلاحية التعديل' : 'للمشاهدة فقط';
      }
      loadAllDataFromServer();
    }

    function autoResize(el) { if(!el) return; el.style.height = 'auto'; el.style.height = (el.scrollHeight + 2) + 'px'; }
    function initAutoResize() { document.querySelectorAll('textarea.card-control').forEach(el => { autoResize(el); el.addEventListener('input', function() { autoResize(this); }); }); }

    async function loadAllDataFromServer() {
      showToast("⏳ جاري الاتصال بالخادم ...");
      try {
        const { data: initData, error: initError } = await window.supabaseClient.from('initiatives').select('*').order('initiative_number', { ascending: true });
        if (initError) throw initError;

        let rawInitiatives = initData || [];
        if (currentUser.role !== 'admin' && currentUser.allowed_initiatives && currentUser.allowed_initiatives.trim() !== '') {
           const allowedIds = currentUser.allowed_initiatives.split(',').map(s => s.trim());
           rawInitiatives = rawInitiatives.filter(item => allowedIds.includes(String(item.initiative_number).trim()));
        }

        initiatives = rawInitiatives.map(item => {
          let parsedGoals = item.goals ? item.goals.split('|').map(g => g.trim()).filter(Boolean) : [];
          let parsedKpis = item.kpis ? item.kpis.split('|').map(k => k.trim()).filter(Boolean) : [];
          let parsedPlan = []; 
          if(item.action_plan) { try { parsedPlan = JSON.parse(item.action_plan); } catch(e) { } }
          
          return {
            id: item.id, initiativeNo: item.initiative_number || "—", initiativeName: item.initiative_name || "—",
            timeline: item.timeline || "—", completionPercent: item.completion_percentage || 0,
            estimatedBudget: item.estimated_budget || "—", remainingAmount: item.remaining_amount || "—",
            description: item.description || "", executingEntity: item.executing_entity || "—",
            supportingEntity: item.supporting_entity || "—", programName: item.program_name || "—",
            followUpManager: item.follow_up_responsible || "—", actionPlan: parsedPlan, goals: parsedGoals, indicators: parsedKpis,
            status: item.status || "لم تبدأ", challenges: item.challenges || ""
          };
        });

        const uniqueEntities = [...new Set((initData || []).map(i => i.executing_entity).filter(Boolean))];
        entitiesList = uniqueEntities.map((name, index) => ({ id: index, name: name }));

        renderEntityOptions(''); populateFollowUpOptions(); renderCards();
        showToast("✅ اكتمل تحميل البيانات.", "success");
      } catch(err) { showToast('❌ فشل جلب البيانات: ' + err.message, "error"); }
    }

    function populateFollowUpOptions() {
      const managers = new Set();
      initiatives.forEach(item => { if(item.followUpManager && item.followUpManager.trim() !== "" && item.followUpManager !== "—") managers.add(item.followUpManager.trim()); });
      const opts = ['<option value="">كل المسؤولين عن المتابعة</option>'];
      Array.from(managers).sort().forEach(m => { opts.push(`<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`); });
      els.followUpSelect.innerHTML = opts.join('');
    }

    function getFilteredData(){
      const q = normalizeForCompare(els.searchInput.value), fu = normalizeForCompare(els.followUpSelect.value), prog = normalizeForCompare(els.programSelect.value);
      let data = initiatives.filter(item => {
        const blob = [item.initiativeNo, item.initiativeName, item.description, item.executingEntity].join(' ');
        return (!q || normalizeForCompare(blob).includes(q)) && (!selectedEntity || normalizeForCompare(item.executingEntity).includes(normalizeForCompare(selectedEntity))) && (!fu || normalizeForCompare(item.followUpManager).includes(fu)) && (!prog || normalizeForCompare(item.programName).includes(prog));
      });
      return data.slice().sort((a,b)=> String(a.initiativeNo).localeCompare(String(b.initiativeNo), 'ar', {numeric:true}) );
    }

    function renderCards(){
      const data = getFilteredData();
      els.statInitiatives.textContent = data.length;
      els.statEntities.textContent = new Set(data.map(x => String(x.executingEntity).trim()).filter(x => x && x !== '—')).size;
      els.statAvg.textContent = (data.length ? Math.round(data.reduce((s,x)=>s+pctNumber(x.completionPercent),0)/data.length) : 0) + '%';
      
      if (!data.length){ els.cards.innerHTML = '<div class="empty" style="grid-column:1/-1">لا توجد مبادرات مطابقة لنتائج التصفية الحالية.</div>'; return; }
      
      els.cards.innerHTML = data.map(item => {
        const pct = Math.max(0, Math.min(100, pctNumber(item.completionPercent)));
        
        const goalsHtml = item.goals.length ? item.goals.map(g => `<li><div style="display:flex;gap:6px;"><textarea class="card-control text" rows="1" disabled>${escapeHtml(g)}</textarea></div></li>`).join('') : '<div class="empty">لم تسجل أهداف</div>';
        const indsHtml = item.indicators.length ? item.indicators.map(n => `<li><div style="display:flex;gap:6px;"><textarea class="card-control text" rows="1" disabled>${escapeHtml(n)}</textarea></div></li>`).join('') : '<div class="empty">لم تسجل مؤشرات</div>';
        
        let statusColor = '#64748b'; if(item.status === 'مكتملة') statusColor = '#16a34a'; else if(item.status === 'قيد التنفيذ') statusColor = '#eab308';

        return `<article class="card">
          <div class="card-head">
            <div class="topline">
              <div style="display:flex; gap:8px;">
                <span class="badge">${escapeHtml(item.initiativeNo || 'بدون رقم')}</span>
                <span class="badge" style="background:${statusColor};">${escapeHtml(item.status || 'لم تبدأ')}</span>
              </div>
              <button class="btn-review" style="padding: 4px 12px; font-size: 12px;" onclick="window.open('initiative.html?id=${item.id}', '_blank')">استعراض المبادرة ↗️</button>
            </div>
            <h2><textarea class="card-control text" rows="1" disabled>${escapeHtml(item.initiativeName)}</textarea></h2>
            <div class="meta">
              <div class="mini"><span>الخطة الزمنية</span><b><textarea class="card-control" rows="1" disabled>${escapeHtml(item.timeline)}</textarea></b></div>
              <div class="mini"><span>نسبة التنفيذ</span><b><textarea class="card-control" rows="1" disabled>${Math.round(pct)}%</textarea></b><div class="progress"><div class="bar" style="width:${pct}%"></div></div></div>
              <div class="mini"><span>الموازنة التقديرية</span><b><textarea class="card-control" rows="1" disabled>${escapeHtml(item.estimatedBudget)}</textarea></b></div>
              <div class="mini"><span>المبلغ المتبقي</span><b><textarea class="card-control" rows="1" disabled>${escapeHtml(item.remainingAmount)}</textarea></b></div>
              <div class="mini" style="grid-column: span 2;"><span>الجهة المنفذة</span><b><textarea class="card-control" rows="1" disabled>${escapeHtml(item.executingEntity)}</textarea></b></div>
              <div class="mini" style="grid-column: span 2;"><span>الجهة المساندة</span><b><textarea class="card-control" rows="1" disabled>${escapeHtml(item.supportingEntity)}</textarea></b></div>
            </div>
          </div>
          <div class="card-body">
            <div class="section"><div class="section-title">وصف المبادرة</div><div class="text"><textarea class="card-control" rows="1" disabled>${escapeHtml(item.description)}</textarea></div></div>
            <div class="section grid-2col">
              <div>
                <div class="section-title">أهداف المبادرة</div>
                <ul class="list">${goalsHtml}</ul>
              </div>
              <div>
                <div class="section-title">المؤشرات الرئيسية</div>
                <ul class="list">${indsHtml}</ul>
              </div>
            </div>
          </div>
        </article>`;
      }).join('');
      initAutoResize();
    }

    function renderEntityOptions(filterText){
      const f = normalizeForCompare(filterText);
      const options = [''].concat(entitiesList.map(e => e.name)).filter(v => !v || !f || normalizeForCompare(v).includes(f));
      els.entityOptions.innerHTML = options.map(v => `<div class="entity-option ${v===selectedEntity?'active':''}" data-value="${escapeHtml(v)}">${escapeHtml(v || 'كل الجهات المنفذة')}</div>`).join('');
    }

    els.searchInput.addEventListener('input', renderCards); els.followUpSelect.addEventListener('change', renderCards);
    els.programSelect.addEventListener('change', renderCards); els.entitySearchBox.addEventListener('focus', () => els.entityOptions.classList.remove('hidden')); els.entitySearchBox.addEventListener('input', () => { selectedEntity = els.entitySearchBox.value; renderEntityOptions(selectedEntity); renderCards(); });
    els.entityOptions.addEventListener('mousedown', e => { const opt = e.target.closest('.entity-option'); if(opt) { selectedEntity = opt.dataset.value; els.entitySearchBox.value = selectedEntity; els.entitySearchBox.placeholder = selectedEntity || 'كل الجهات المنفذة'; els.entityOptions.classList.add('hidden'); renderCards(); } });
    function toggleMenu() { document.getElementById("dropdownMenu").classList.toggle("show"); }

    function exportToExcel() { showToast("ميزة التصدير مفعلة", "success"); }
    function exportToPowerPoint() { showToast("ميزة التصدير مفعلة", "success"); }

    /* دالة الشات بوت العائم للصفحة الرئيسية */
    function toggleChat() { document.getElementById('chatWindow').classList.toggle('show'); }
    async function sendChatMessage() {
      const input = document.getElementById('chatInput'); const msg = input.value.trim(); if(!msg) return;
      const chatBody = document.getElementById('chatBody'); chatBody.innerHTML += `<div class="chat-msg user">${escapeHtml(msg)}</div>`;
      chatHistoryLog.push({ role: 'user', parts: [{ text: msg }] }); input.value = '';
      const loadingId = 'loading-' + Date.now(); chatBody.innerHTML += `<div class="chat-msg ai" id="${loadingId}">⏳...</div>`; chatBody.scrollTop = chatBody.scrollHeight;
      
      let contextData = initiatives.map(item => `[رقم المبادرة: ${item.initiativeNo}] المبادرة: ${item.initiativeName}، النسبة: ${Math.round(pctNumber(item.completionPercent))}%، المنفذ: ${item.executingEntity}`).join('\n');
      const { data: res, error } = await window.supabaseClient.functions.invoke('chat-bot', { body: { context: contextData, history: chatHistoryLog.slice(-5) } });
      
      document.getElementById(loadingId).remove();
      if(!error && res.success) { chatBody.innerHTML += `<div class="chat-msg ai">${res.reply.replace(/\n/g, '<br>')}</div>`; chatHistoryLog.push({ role: 'model', parts: [{ text: res.reply }] }); }
      else { chatBody.innerHTML += `<div class="chat-msg ai" style="color:red">❌ فشل الاتصال.</div>`; }
      chatBody.scrollTop = chatBody.scrollHeight;
    }
  </script>
</body>
</html>
